  visual_focus:
    - "Isolierte Form neben medialer Form."
    - "Mittelstellung mit Verbindungslinien auf beiden Seiten."
    - "Kleine Wortschemata mit markierter Mittelposition."
    - "Vereinfachte Beispiele mit klar sichtbarem Formkern."
  example_items:
