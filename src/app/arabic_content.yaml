  lesson_id: "4.1.1"
  lesson_title: "Von isoliert zu final"
  lesson_goal: "Der Lernende versteht, dass ein bekannter Buchstabe am Wortende anders erscheinen kann, aber derselbe Buchstabe bleibt."
  short_didactic_purpose: "Erster kontrollierter Kontakt mit positionsabhängigen Formen. Die Endform wird direkt an die bekannte isolierte Form zurückgebunden."
  new_content:
    - "Ein Buchstabe kann am Wortende anders aussehen als in isolierter Form."
    - "Formveränderung am Wortende bedeutet keinen neuen Buchstaben."
    - "Isolierte und finale Form gehören zur selben Identität."
  review_content:
    - "Bereits bekannte isolierte Buchstabenformen."
    - "Form als stabile Grundidee trotz kleiner Variation."
  visual_focus:
    - "Direkte Zweierpaare aus isolierter und finaler Form."
    - "Klare Markierung: isoliert alleinstehend, final als Wortende."
    - "Bekannte Buchstaben in Großdarstellung mit Endform daneben."
    - "Erste kleine Ketten mit finalem letztem Zeichen."
  example_items:
