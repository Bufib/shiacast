    - "Unterscheidet isoliert, initial, medial und final sicher."
    - "Erkennt trotz Formveränderung die Identität."
    - "Hat das Positionssystem als Ganzes verstanden."

- level_id: "5"
  level_title: "Buchstabenverbindungen"
  module_id: "5.1"
  module_title: "Verbindbare und nicht-verbindbare Buchstaben"
  lesson_id: "5.1.1"
  lesson_title: "Buchstaben, die nach links nicht weiterverbinden"
  lesson_goal: "Der Lernende erkennt die wichtigsten Buchstaben, die nach links nicht weiterverbinden, und versteht, dass nach ihnen eine sichtbare Unterbrechung entsteht."
  short_didactic_purpose: "Einführung der ersten zentralen Verbindungsregel innerhalb des Wortes."
  new_content:
    - "Bestimmte Buchstaben verbinden nach links nicht weiter."
    - "Nach diesen Buchstaben endet die durchgehende Verbindung."
    - "Eine Unterbrechung im Wort bedeutet nicht automatisch ein neues Wort."
  review_content:
    - "Positionsformen im Wort."
    - "Wortanfang, Wortmitte und Wortende."
  visual_focus:
    - "Einzelne Stop-Buchstaben in großer Darstellung."
    - "Kurze Ketten mit sichtbarer Unterbrechung nach dem Buchstaben."
    - "Markierte Stellen, an denen die Verbindung endet."
    - "Vergleich von Ketten mit und ohne Unterbrechung."
  example_items:
    - "ا"
    - "د"
    - "ذ"
    - "ر"
    - "ز"
    - "و"
    - "Kurzkette mit sichtbarem Bruch nach د oder ر"
  contrast_items:
    - "weiterlaufende Verbindung vs. Verbindungsstopp"
    - "Stop-Buchstabe vs. regulär verbindbarer Buchstabe"
    - "Unterbrechung im Wort vs. Wortende"
    - "ein Wort mit innerem Bruch vs. zwei getrennte Wörter"
  common_errors:
