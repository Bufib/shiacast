    - "Erkennt die Wortmitte als besondere Position."
    - "Identifiziert den Formkern trotz beidseitiger Verbindung."
    - "Behandelt mediale Gestalten nicht mehr als völlig neue Buchstaben."

- level_id: "4"
  level_title: "Buchstabenformen im Wort"
