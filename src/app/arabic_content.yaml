    - "Unterbrechung als Wortgrenze deuten"
    - "Stop-Verhalten nicht systematisch erkennen"
    - "Nur das Gesamtbild statt die Verbindungslinie beachten"
  mastery_criteria:
    - "Erkennt die Stop-Buchstaben sicher wieder."
    - "Markiert in einfachen Ketten zuverlässig, wo die Verbindung endet."
    - "Interpretiert nicht jede Unterbrechung als neues Wort."
    - "Erkennt korrekt, welche Ketten nach links nicht weiterverbunden werden."

