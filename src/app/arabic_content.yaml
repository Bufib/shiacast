- level_id: "1"
  level_title: "Einstieg in die Schriftwelt"
  module_id: "1.1"
  module_title: "Leserichtung und Schriftorientierung"
  lesson_id: "1.1.1"
  lesson_title: "Arabisch liest man von rechts nach links"
  lesson_goal: "Der Lernende versteht sicher, dass arabische Schrift rechts beginnt und nach links gelesen wird, und wendet diese Blickrichtung bewusst an."
  short_didactic_purpose: "Aufbau der grundlegenden Blicklenkung. Noch keine Buchstabenarbeit, sondern Umstellung der Leseroutine von links-nach-rechts auf rechts-nach-links."
  new_content:
    - "Startpunkt arabischer Schrift liegt rechts."
    - "Blickverlauf geht von rechts nach links."
    - "Zeichenfolgen werden in fester Reihenfolge verfolgt, nicht flächig betrachtet."
  review_content:
    - "Kein fachlicher Vorinhalt; nur allgemeine visuelle Orientierung."
  visual_focus:
    - "Horizontale Reihen aus 3 bis 5 einfachen Symbolen."
    - "Deutlich markierter rechter Rand als Startpunkt."
    - "Pfeilkontraste zwischen richtiger und falscher Leserichtung."
    - "Reihen mit markiertem Start rechts und falschem Start links."
  example_items:
    - "○ ○ ○"
    - "□ □ □"
    - "• • • •"
    - "Reihe mit farblich markiertem rechtem Symbol"
    - "Zwei identische Reihen, einmal mit Pfeil nach links, einmal mit Pfeil nach rechts"
  contrast_items:
    - "links beginnen vs. rechts beginnen"
    - "falsche Blickrichtung vs. richtige Blickrichtung"
    - "Startpunkt links vs. Startpunkt rechts"
    - "deutsche Leserichtung vs. arabische Leserichtung"
    - "Bild betrachten vs. Folge verfolgen"
  common_errors:
    - "Start automatisch links setzen"
    - "Zuerst in die Mitte schauen"
    - "Reihe als Bild statt als geordnete Folge wahrnehmen"
    - "Blick unbewusst nach westlicher Leseroutine führen"
    - "Richtung als unwichtig ansehen"
  mastery_criteria:
    - "Markiert in mindestens 9 von 10 Beispielen den Startpunkt rechts korrekt."
    - "Wählt bei einfachen Reihen zuverlässig die richtige Blickrichtung."
    - "Beginnt nicht mehr spontan links."
    - "Verfolgt einfache Symbolfolgen konsequent von rechts nach links."

- level_id: "1"
  level_title: "Einstieg in die Schriftwelt"
  module_id: "1.1"
  module_title: "Leserichtung und Schriftorientierung"
  lesson_id: "1.1.2"
  lesson_title: "Wo beginnt und endet ein arabisches Wort"
  lesson_goal: "Der Lernende erkennt, dass ein arabisches Wort rechts beginnt und links endet, und kann Wortanfang, Wortende und Zwischenräume sicher identifizieren."
  short_didactic_purpose: "Einführung in die Idee des Wortblocks als begrenzte Einheit. Der Lernende soll Anfang, Ende und Leerstellen visuell erfassen."
  new_content:
    - "Ein Wort ist ein geordneter Block mit Anfang und Ende."
    - "Wortanfang liegt rechts, Wortende links."
    - "Zwischenräume trennen Wortblöcke voneinander."
  review_content:
    - "Leserichtung von rechts nach links."
    - "Startpunkt rechts als Grundprinzip."
  visual_focus:
    - "Kurze künstliche Zeichenblöcke."
    - "Zwei Blöcke mit klar erkennbarem Zwischenraum."
    - "Aufgaben zum Markieren des ersten und letzten Zeichens."
    - "Blockgruppen mit deutlichem Abstand."
  example_items:
    - "Dreiteiliger Zeichenblock mit Aufgabe: Zeige den Anfang."
    - "Zwei kurze Blöcke nebeneinander mit Leerraum."
    - "Aufgabe: Markiere das letzte Zeichen."
    - "Aufgabe: Wo ist die Lücke zwischen zwei Wörtern?"
  contrast_items:
    - "Wortanfang rechts vs. Wortende links"
    - "ein Wort vs. zwei Wörter"
    - "Schriftblock vs. Zwischenraum"
    - "erstes Zeichen vs. letztes Zeichen"
    - "richtige Wortgrenze vs. falsche Segmentierung"
  common_errors:
    - "Linkes Zeichen für den Anfang halten"
    - "Leerzeichen zwischen zwei Wörtern übersehen"
    - "Anfang und Ende verwechseln"
    - "Formkette nur als Ganzbild sehen"
    - "Wortbegrenzung nicht erkennen"
  mastery_criteria:
    - "Identifiziert in kurzen Blöcken Anfang und Ende sicher."
    - "Trennt zwei Wortblöcke zuverlässig voneinander."
    - "Nimmt Leerstellen zwischen Wörtern wahr."
    - "Markiert in der Mehrzahl der Beispiele das erste Zeichen rechts und das letzte links korrekt."

- level_id: "1"
  level_title: "Einstieg in die Schriftwelt"
  module_id: "1.1"
  module_title: "Leserichtung und Schriftorientierung"
  lesson_id: "1.1.3"
  lesson_title: "Schrift als geordnete Zeichenfolge"
  lesson_goal: "Der Lernende versteht, dass Schrift aus einer festen Reihenfolge von Zeichen besteht, und bemerkt Veränderungen in der Reihenfolge."
  short_didactic_purpose: "Aufbau linearer Strukturwahrnehmung. Schrift soll nicht als Dekoration, sondern als geordnete Folge gesehen werden."
  new_content:
    - "Zeichen stehen in fester Ordnung."
    - "Dieselben Formen ergeben in anderer Reihenfolge eine andere Struktur."
    - "Lineare Verfolgung ist wichtig, nicht bloßer Gesamteindruck."
  review_content:
    - "Leserichtung rechts nach links."
    - "Wortblock als geordnete Einheit."
  visual_focus:
    - "Kurze Sequenzen aus 3 bis 4 abstrakten Formen."
    - "Paare mit gleichen Formen in veränderter Reihenfolge."
    - "Vergleichsaufgaben: gleich oder verschieden."
    - "Fehlerbilder mit vertauschtem Mittelelement."
  example_items:
    - "Form A – Form B – Form C"
    - "Form A – Form C – Form B"
    - "Zielkette mit drei Antwortmöglichkeiten"
    - "Zwei fast gleiche Ketten mit vertauschtem mittleren Zeichen"
  contrast_items:
    - "gleiche Reihenfolge vs. veränderte Reihenfolge"
    - "geordnete Folge vs. chaotische Wahrnehmung"
    - "strukturiertes Nachverfolgen vs. oberflächliches Anschauen"
    - "gleiches Muster vs. vertauschtes Muster"
  common_errors:
    - "Nur auf den Gesamteindruck achten"
    - "Vertauschte Reihenfolge nicht bemerken"
    - "Gleiche Formen automatisch für identisch halten"
    - "Mittleres Zeichen überspringen"
    - "Lineare Struktur nicht bewusst verfolgen"
  mastery_criteria:
    - "Erkennt bei Vergleichsaufgaben die richtige Reihenfolge sicher."
    - "Bemerkt vertauschte Zeichenfolgen in mindestens 8 von 10 Fällen."
    - "Betrachtet Ketten strukturiert statt nur grob."
    - "Kann zeigen, dass die Folge in fester Ordnung wahrgenommen wird."

- level_id: "1"
  level_title: "Einstieg in die Schriftwelt"
  module_id: "1.2"
  module_title: "Buchstaben als Formen"
  lesson_id: "1.2.1"
  lesson_title: "Linien, Bögen, Haken"
  lesson_goal: "Der Lernende erkennt Grundbestandteile arabischer Schriftformen und unterscheidet Linien, Bögen, Richtungswechsel und Haken."
  short_didactic_purpose: "Beginn der reinen Sehschulung. Komplexe Formen werden in einfache visuelle Bausteine zerlegt."
  new_content:
    - "Schriftformen bestehen aus einfachen Formelementen."
    - "Gerade Linien, Bögen und Haken sind unterscheidbare Merkmale."
    - "Formen können nach Verlauf und Krümmung verglichen werden."
  review_content:
    - "Schrift ist geordnete Struktur, nicht Ornament."
    - "Detailwahrnehmung ist wichtig."
  visual_focus:
    - "Isolierte Formelemente in Großdarstellung."
    - "Gerade und gebogene Linien im Vergleich."
    - "Kleine Hakenformen."
    - "Kombinationen aus Linie und Bogen."
  example_items:
    - "Formpaar mit geradem Zug vs. Bogen"
    - "Fragment mit kleinem Haken"
    - "Zwei ähnlich gekrümmte Formen"
    - "Sortieraufgabe nach Formtyp"
  contrast_items:
    - "gerade Linie vs. Bogen"
    - "flach gebogen vs. stark gebogen"
    - "mit Haken vs. ohne Haken"
    - "einfacher Verlauf vs. zusammengesetzter Verlauf"
    - "ähnliche Form vs. abweichende Form"
  common_errors:
    - "Nur den Gesamteindruck sehen"
    - "Kleine Formdetails übersehen"
    - "Haken oder Richtungswechsel nicht wahrnehmen"
    - "Zu grob einordnen"
    - "Leichte Formunterschiede nicht beachten"
  mastery_criteria:
    - "Unterscheidet einfache Formpaare korrekt."
    - "Markiert Linien, Bögen und Haken bewusst."
    - "Gruppiert ähnliche Formtypen zuverlässig."
    - "Schaut detailorientiert statt nur flächig."

- level_id: "1"
  level_title: "Einstieg in die Schriftwelt"
  module_id: "1.2"
  module_title: "Buchstaben als Formen"
  lesson_id: "1.2.2"
  lesson_title: "Offene und geschlossene Formen"
  lesson_goal: "Der Lernende unterscheidet sicher zwischen offenen und geschlossenen Formtypen und nimmt Formräume bewusst wahr."
  short_didactic_purpose: "Vertiefung der Formwahrnehmung durch Fokus auf Öffnung, Schließung und Innenraum."
  new_content:
    - "Formen können offen oder geschlossen sein."
    - "Öffnungen und Innenräume sind relevante Merkmale."
    - "Nicht nur Außenlinien, sondern auch Formräume tragen zur Erkennung bei."
  review_content:
    - "Linien, Bögen und Haken als Formelemente."
    - "Detailorientierte Formbetrachtung."
  visual_focus:
    - "Offene Bogenformen."
    - "Klar geschlossene Formen."
    - "Vergleichspaare offen vs. geschlossen."
    - "Großdarstellung der Öffnung oder Schließung."
  example_items:
    - "Offene Hakenform neben runder geschlossener Form"
    - "Zwei ähnliche Formen mit unterschiedlicher Öffnung"
    - "Aufgabe: Markiere die offene Stelle"
    - "Sortieren in offen und geschlossen"
  contrast_items:
    - "offen vs. geschlossen"
    - "große Öffnung vs. kleine Öffnung"
    - "geschlossener Innenraum vs. kein Innenraum"
    - "runde Form vs. lineare Form"
    - "Oberlänge vs. Unterlänge"
  common_errors:
    - "Öffnungen nicht bemerken"
    - "Fast geschlossene Formen als völlig geschlossen deuten"
    - "Nur die Außenlinie beachten"
    - "Innenraum nicht wahrnehmen"
    - "Offene Form als unvollständig missverstehen"
  mastery_criteria:
    - "Unterscheidet offene und geschlossene Formen zuverlässig."
    - "Löst Klassifikationsaufgaben zu 80 bis 90 Prozent korrekt."
    - "Kann offene Stelle oder geschlossene Zone markieren."
    - "Nimmt auch kleine Strukturunterschiede zunehmend bewusst wahr."

- level_id: "1"
  level_title: "Einstieg in die Schriftwelt"
  module_id: "1.2"
  module_title: "Buchstaben als Formen"
  lesson_id: "1.2.3"
  lesson_title: "Der Buchstabe als wiedererkennbare Einheit"
  lesson_goal: "Der Lernende erkennt, dass derselbe Buchstabe trotz kleiner optischer Unterschiede dieselbe Grundform bleibt."
  short_didactic_purpose: "Aufbau von Formkonstanz. Variationen sollen nicht als völlig neue Formen missverstanden werden."
  new_content:
    - "Ein Grundkörper kann in mehreren leicht unterschiedlichen Darstellungen erscheinen."
    - "Größe, Strichstärke oder kleine Rundungsunterschiede ändern nicht die Identität."
    - "Wiedererkennen beruht auf stabilen Kernmerkmalen."
  review_content:
    - "Formelemente, Öffnungen und Strukturmerkmale."
    - "Detailwahrnehmung als Grundlage des Wiedererkennens."
  visual_focus:
    - "Mehrere Versionen desselben Grundkörpers."
    - "Leichte Variationen in Größe und Strichstärke."
    - "Mischgruppen aus gleichen und ähnlichen Formen."
    - "Zuordnungsaufgaben nach Formfamilie."
  example_items:
    - "Gleiche Form mit längerer Linie"
    - "Gleiche Form mit leicht anderer Rundung"
    - "Dünnere und dickere Variante derselben Form"
    - "Aufgabe: Welche Formen gehören zusammen?"
  contrast_items:
    - "gleicher Grundkörper mit kleiner Variation vs. anderer Grundkörper"
    - "wesentliche Merkmale vs. unwesentliche Oberflächenunterschiede"
    - "wiedererkennbare Einheit vs. neue Form"
  common_errors:
    - "Jede kleine Variation als neuen Buchstaben behandeln"
    - "Stabile Grundgestalt nicht erkennen"
    - "Zu stark auf Größe oder Strichstärke reagieren"
    - "Nur ein Einzelbild statt eine Formidee speichern"
  mastery_criteria:
    - "Ordnet gleiche Grundkörper zuverlässig zusammen."
    - "Toleriert kleine Variationen ohne Identitätsverlust."
    - "Gruppiert Formfamilien korrekt."
    - "Erkennt hinter verschiedenen Darstellungen dieselbe Grundform."

- level_id: "1"
  level_title: "Einstieg in die Schriftwelt"
  module_id: "1.3"
  module_title: "Punkte als bedeutungsunterscheidende Merkmale"
  lesson_id: "1.3.1"
  lesson_title: "Ein Punkt verändert den Buchstaben"
  lesson_goal: "Der Lernende versteht, dass derselbe Grundkörper mit und ohne Punkt verschiedene Buchstaben bilden kann."
  short_didactic_purpose: "Einführung der Punkte als identitätsrelevantes Merkmal. Punkte sollen nicht als Dekoration wahrgenommen werden."
  new_content:
    - "Punkte sind Teil der Buchstabenidentität."
    - "Gleicher Grundkörper kann durch Punktveränderung ein anderer Buchstabe werden."
    - "Punkt vorhanden oder nicht vorhanden ist bedeutungsentscheidend."
  review_content:
    - "Grundkörper als wiedererkennbare Formeinheit."
    - "Detailorientiertes Hinsehen."
  visual_focus:
    - "Paare mit gleichem Grundkörper, einmal ohne und einmal mit Punkt."
    - "Großdarstellung des Punktunterschieds."
    - "Vergleichsaufgaben gleich oder verschieden."
    - "Erste reale Buchstabenfamilien als Sichttraining."
  example_items:
    - "ب / ت / ث als Vorschau derselben Grundform mit unterschiedlicher Punktstruktur"
    - "ج / ح / خ als Kontrast von ohne Punkt, Punkt unten, Punkt oben"
    - "Aufgabe: Sind diese zwei Formen gleich oder verschieden?"
  contrast_items:
    - "ohne Punkt vs. mit Punkt"
    - "gleiche Formbasis vs. andere Identität"
    - "Punkt vorhanden vs. Punkt fehlt"
    - "oberflächlich ähnlich vs. tatsächlich verschieden"
  common_errors:
    - "Punkte ganz ignorieren"
    - "Formen mit und ohne Punkt als gleich behandeln"
    - "Nur auf den großen Formkörper achten"
    - "Punkt zwar sehen, aber nicht als entscheidend bewerten"
  mastery_criteria:
    - "Kann klar sagen, dass ein Punkt einen anderen Buchstaben erzeugt."
    - "Trennt Formen mit und ohne Punkt sicher."
    - "Beachtet nicht nur den Grundkörper."
    - "Erkennt in gemischten Beispielen zuverlässig, dass Punktänderung Identitätsänderung bedeutet."

- level_id: "1"
  level_title: "Einstieg in die Schriftwelt"
  module_id: "1.3"
  module_title: "Punkte als bedeutungsunterscheidende Merkmale"
  lesson_id: "1.3.2"
  lesson_title: "Ein, zwei oder drei Punkte"
  lesson_goal: "Der Lernende unterscheidet die Anzahl der Punkte sicher und präzise."
  short_didactic_purpose: "Schärfung der exakten Punktwahrnehmung. Punktgruppen sollen gezählt und nicht nur grob wahrgenommen werden."
  new_content:
    - "Nicht nur Punkt oder kein Punkt ist relevant, sondern auch die Anzahl."
    - "Ein, zwei und drei Punkte müssen exakt unterschieden werden."
    - "Mehrere Punkte dürfen nicht als ungenaue Punktwolke gesehen werden."
  review_content:
    - "Punkte sind identitätsentscheidend."
    - "Gleicher Grundkörper kann durch Punktstruktur variieren."
  visual_focus:
    - "Formen mit einem, zwei und drei Punkten."
    - "Direkte Reihenvergleiche der Punktanzahl."
    - "Zähl- und Sortieraufgaben."
    - "Klar abgesetzte Punktgruppen."
  example_items:
    - "ب ت ث"
    - "ف ق"
    - "س ش"
    - "Aufgabe: Sortiere nach Punktanzahl."
  contrast_items:
    - "ein Punkt vs. zwei Punkte"
    - "zwei Punkte vs. drei Punkte"
    - "exaktes Zählen vs. grobes Schätzen"
    - "klare Punktgruppe vs. ungenaue Wahrnehmung"
  common_errors:
    - "Zwei und drei Punkte verwechseln"
    - "Mehrere Punkte nur als oben irgendetwas wahrnehmen"
    - "Nicht wirklich zählen"
    - "Nur grob sehen, dass irgendein Punkt vorhanden ist"
  mastery_criteria:
    - "Gibt in mindestens 9 von 10 Fällen die Punktanzahl korrekt an."
    - "Trennt zwei und drei Punkte sicher."
    - "Sortiert gemischte Beispiele zuverlässig nach Punktzahl."
    - "Achtet sichtbar auf exakte Anzahl."

- level_id: "1"
  level_title: "Einstieg in die Schriftwelt"
  module_id: "1.3"
  module_title: "Punkte als bedeutungsunterscheidende Merkmale"
  lesson_id: "1.3.3"
  lesson_title: "Punkte oben oder unten"
  lesson_goal: "Der Lernende unterscheidet sicher, ob Punkte über oder unter dem Grundkörper stehen."
  short_didactic_purpose: "Abschluss der Punktschulung. Punktlage wird als zweites entscheidendes Merkmal neben der Punktanzahl verankert."
  new_content:
    - "Punktlage verändert die Identität eines Zeichens."
    - "Punkte können oben oder unten stehen."
    - "Punktanzahl und Punktlage müssen gemeinsam beachtet werden."
  review_content:
    - "Punkte sind bedeutungsrelevant."
    - "Ein, zwei und drei Punkte unterscheiden."
  visual_focus:
    - "Direkte Gegenüberstellungen Punkt oben vs. Punkt unten."
    - "Gleiche Grundform mit wechselnder Punktlage."
    - "Gruppierübungen nach Punktlage."
    - "Groß dargestellte Punktpositionen."
  example_items:
    - "ب / ن / ت / ث / ي"
    - "ج / خ"
    - "Aufgabe: Oben oder unten?"
    - "Aufgabe: Gruppiere nach Punktlage."
  contrast_items:
    - "Punkt oben vs. Punkt unten"
    - "gleiche Punktanzahl, andere Lage"
    - "gleicher Grundkörper, andere räumliche Markierung"
    - "wirklich hinsehen vs. Punktlage nur vermuten"
  common_errors:
    - "Punktlage nicht beachten"
    - "Form erinnern und Punkte nur gedanklich ergänzen"
    - "Oben und unten verwechseln"
    - "Punktanzahl korrekt, Lage aber falsch wahrnehmen"
  mastery_criteria:
    - "Gibt in gemischten Beispielen sicher an, ob Punkte oben oder unten liegen."
    - "Trennt gleiche Grundformen mit unterschiedlicher Punktlage sauber."
    - "Identifiziert Punktlage sichtbar korrekt statt zu raten."
    - "Behält Punktanzahl und Punktlage gemeinsam im Blick."

- level_id: "2"
  level_title: "Erste Buchstabenfamilien"
  module_id: "2.1"
  module_title: "Erste klare Buchstaben"
  lesson_id: "2.1.1"
  lesson_title: "Alif: ا"
  lesson_goal: "Der Lernende erkennt ا sicher als erste reale arabische Buchstabenform und speichert ihn als stabile visuelle Einheit ab."
  short_didactic_purpose: "Ruhiger Einstieg in reale Buchstabenarbeit mit einer sehr klaren und einfachen Form."
  new_content:
    - "ا ist ein echter arabischer Buchstabe mit fester Identität."
    - "Seine Form ist schlicht, aber nicht bedeutungslos."
    - "Ein realer Buchstabe kann stabil wiedererkannt werden."
  review_content:
    - "Schrift als geordnete Struktur."
    - "Form als wiedererkennbare Einheit."
  visual_focus:
    - "ا groß und isoliert."
    - "Mehrere Darstellungen von ا in gleicher Grundform."
    - "Vergleich mit einfachen Strichformen."
    - "Mischreihen, in denen ا identifiziert werden muss."
  example_items:
    - "ا"
    - "○ ا ○ ا □"
    - "Aufgabe: Finde alle ا"
    - "Vergleich echter Buchstabe vs. bloßer Strich"
  contrast_items:
    - "ا vs. bloßer Strich"
    - "echter Buchstabe vs. beliebige Linie"
    - "bewusstes Wiedererkennen vs. Übersehen"
  common_errors:
    - "ا nur für eine Linie halten"
    - "Dem Zeichen keine eigene Identität geben"
    - "Mit nichtsprachlichen Strichen verwechseln"
    - "Form nicht bewusst abspeichern, weil sie zu einfach wirkt"
  mastery_criteria:
    - "Identifiziert ا in gemischten Reihen sicher."
    - "Erkennt die Form stabil wieder."
    - "Behandelt sie nicht mehr als bloßen Strich."
    - "Wählt denselben Buchstaben in Wiedererkennungsaufgaben zuverlässig aus."

- level_id: "2"
  level_title: "Erste Buchstabenfamilien"
  module_id: "2.1"
  module_title: "Erste klare Buchstaben"
  lesson_id: "2.1.2"
  lesson_title: "Dāl und Dhāl: د / ذ"
  lesson_goal: "Der Lernende erkennt د und ذ als verwandtes Paar mit gleichem Grundkörper und unterscheidet beide sicher über den Punkt."
  short_didactic_purpose: "Erster echter Punktkontrast bei realen Buchstaben. Das Punktprinzip aus Level 1 wird auf ein konkretes Buchstabenpaar übertragen."
  new_content:
    - "د und ذ teilen einen Grundkörper."
    - "Der Punkt verändert die Identität des Buchstabens."
    - "Reale Buchstabenpaare können systematisch über Punktmerkmale unterschieden werden."
  review_content:
    - "Punkte sind identitätsentscheidend."
    - "Grundkörper und Punktstruktur gemeinsam beachten."
    - "ا als erster realer Buchstabe."
  visual_focus:
    - "د und ذ groß und isoliert nebeneinander."
    - "Mehrere Wiederholungen beider Formen."
    - "Sortierfelder für beide Buchstaben."
    - "Mischreihen mit د, ذ und später ا."
  example_items:
    - "د د ذ د ذ"
    - "Direkter Vergleich د / ذ"
    - "Mischset ا د ذ"
    - "Aufgabe: Welches ist mit Punkt, welches ohne?"
  contrast_items:
    - "د vs. ذ"
    - "gleicher Grundkörper ohne Punkt vs. mit Punkt"
    - "Punkt vorhanden vs. Punkt fehlt"
