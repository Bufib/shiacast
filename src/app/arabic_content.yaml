    - "Endform für einen neuen Buchstaben halten"
    - "Nur die isolierte Form sicher erkennen"
    - "Endform getrennt statt verbunden mit der Grundform speichern"
    - "Auf die ungewohnte Gestalt stärker achten als auf die Kontinuität"
  mastery_criteria:
    - "Ordnet isolierte und finale Form sicher einander zu."
    - "Erkennt bei Vergleichsaufgaben, dass beide dieselbe Identität haben."
    - "Geht nicht mehr spontan von einem neuen Zeichen aus."
    - "Kann erste finale Formen korrekt auf die bekannte Grundform zurückführen."

