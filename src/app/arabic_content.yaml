    - "Beachtet Punktlage und Formkern auch in der Binnenform."
    - "Nimmt mediale Gestalten nicht mehr als unübersichtliche Linien wahr."

- level_id: "4"
  level_title: "Buchstabenformen im Wort"
  module_id: "4.3"
  module_title: "Medialformen"
  lesson_id: "4.3.3"
  lesson_title: "Vierformenvergleich"
  lesson_goal: "Der Lernende erkennt isolierte, initiale, mediale und finale Formen desselben Buchstabens als vollständige Positionsfamilie."
  short_didactic_purpose: "Zusammenführung aller vier Hauptpositionen zu einer vollständigen Formfamilie."
  new_content:
    - "Ein Buchstabe kann vier typische Positionsformen haben."
    - "Isoliert, initial, medial und final bilden eine vollständige Positionsfamilie."
    - "Anschluss verändert die Gestalt, nicht die Identität."
